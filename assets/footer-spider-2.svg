<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 130" width="1200" height="130" font-family="'Courier New', Courier, monospace">
  <defs>
    <linearGradient id="fedge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#bb9af7"/>
      <stop offset="0.5" stop-color="#7aa2f7"/>
      <stop offset="1" stop-color="#f7768e"/>
    </linearGradient>
    <pattern id="fgrid" width="26" height="26" patternUnits="userSpaceOnUse">
      <path d="M26 0H0V26" fill="none" stroke="#7aa2f7" stroke-width="0.5" opacity="0.06"/>
    </pattern>
    <g id="fspider" fill="currentColor" stroke="none">
      <path d="M -8,-24 L -54,-52 L -102,-58 L -6,-16 Z"/>
      <path d="M -9,-15 L -58,-30 L -110,-26 L -7,-7 Z"/>
      <path d="M -9,-5  L -58,-6  L -110,6   L -7,3 Z"/>
      <path d="M -8,4   L -52,16  L -96,42   L -6,12 Z"/>
      <path d="M 8,-24 L 54,-52 L 102,-58 L 6,-16 Z"/>
      <path d="M 9,-15 L 58,-30 L 110,-26 L 7,-7 Z"/>
      <path d="M 9,-5  L 58,-6  L 110,6   L 7,3 Z"/>
      <path d="M 8,4   L 52,16  L 96,42   L 6,12 Z"/>
      <ellipse cx="0" cy="-18" rx="9" ry="11"/>
      <ellipse cx="0" cy="16" rx="13" ry="30"/>
    </g>
  </defs>

  <rect x="2" y="2" width="1196" height="126" rx="12" fill="#1a1b26" stroke="url(#fedge)" stroke-width="2"/>
  <rect x="2" y="2" width="1196" height="126" rx="12" fill="url(#fgrid)"/>

  <!-- web thread + glitch spider -->
  <line x1="62" y1="4" x2="62" y2="48" stroke="#565f89" stroke-width="1" opacity="0.55"/>
  <g transform="translate(62 70) scale(0.42)">
    <g>
      <use href="#fspider" xlink:href="#fspider" color="#f7768e" opacity="0.45">
        <animate attributeName="x" values="0;4;-3;0" dur="2.8s" repeatCount="indefinite"/>
      </use>
      <use href="#fspider" xlink:href="#fspider" color="#7dcfff" opacity="0.45">
        <animate attributeName="x" values="0;-4;3;0" dur="2.8s" repeatCount="indefinite"/>
      </use>
      <use href="#fspider" xlink:href="#fspider" color="#c0caf5"/>
      <path d="M -6,4 L 6,4 L 0,16 Z M -6,28 L 6,28 L 0,16 Z" fill="#f7768e"/>
      <path d="M -4,-4 L -1,6 L -6,2 Z M 4,-4 L 1,6 L 6,2 Z" fill="#1a1b26"/>
      <circle cx="-4" cy="-24" r="2.6" fill="#f7768e">
        <animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="4" cy="-24" r="2.6" fill="#f7768e">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1.6s" repeatCount="indefinite"/>
      </circle>
      <animateTransform attributeName="transform" type="rotate" values="0 0 0;1.6 0 0;-1.6 0 0;0 0 0" dur="4.5s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- prompt -->
  <g font-size="17">
    <text x="118" y="60"><tspan fill="#9ece6a">root@devshm3</tspan><tspan fill="#565f89">:</tspan><tspan fill="#7aa2f7">~</tspan><tspan fill="#565f89"># </tspan><tspan fill="#c0caf5">exit</tspan></text>
    <text x="118" y="86" font-size="14"><tspan fill="#565f89">// connection to target closed — </tspan><tspan fill="#bb9af7">stay curious, hack ethically</tspan></text>
    <rect x="184" y="48" width="11" height="15" fill="#f7768e">
      <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <text x="1140" y="70" text-anchor="end" font-size="13" fill="#565f89" letter-spacing="2">EOF</text>
</svg>
